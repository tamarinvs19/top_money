{% extends 'base.html' %}
{% load static %}
{% block title %}{% if bank %}Edit Bank{% else %}Add Bank{% endif %} - Finance Manager{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <h4 class="mb-4">{% if bank %}Edit Bank{% else %}Add Bank{% endif %}</h4>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Bank Name</label>
            <input type="text" name="name" class="form-control" value="{{ bank.name|default:'' }}" required />
          </div>
          {% if bank.image %}
          <div class="mb-3">
            <label class="form-label">Bank Logo</label>
            <div>
              <img src="{% static bank.image %}" alt="{{ bank.name }}" style="max-width: 100px; max-height: 100px; object-fit: contain;">
            </div>
          </div>
          {% endif %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'banks' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
