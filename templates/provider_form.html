{% extends 'base.html' %}
{% block title %}{% if provider %}Edit Provider{% else %}Add Provider{% endif %} - Finance Manager{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <h4 class="mb-4">{% if provider %}Edit Provider{% else %}Add Provider{% endif %}</h4>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Provider Name</label>
            <input type="text" name="name" class="form-control" value="{{ provider.name|default:'' }}" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Provider Logo</label>
            <input type="file" name="image" class="form-control" accept="image/*" />
            {% if provider.image %}
            <div class="mt-2">
              <img src="{{ provider.image.url }}" alt="{{ provider.name }}" style="max-width: 100px; max-height: 100px; object-fit: contain;">
            </div>
            {% endif %}
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'banks' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
